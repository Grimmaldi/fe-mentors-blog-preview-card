<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Blog Preview Card - Frondend Mentors Assignment</title>
</head>
<body>
    <main>
        <div class="container">
            <figure class="article-overview">
                <div>
                    <img src="./assets/images/illustration-article.svg" alt="">
                </div>
                <caption class="article-category">Learning</caption>
                <p class="date_published">Published </p>
            </figure>
            <h1>HTML &amp; CSS foundations</h1>
            <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            <figure class="author-info">
                <img src="./assets/images/image-avatar.webp" alt="A portrait of the article's author">
                <p class="author-name">Greg Hooper</p>
            </figure>
        </div>
    </main>
</body>
</html>
